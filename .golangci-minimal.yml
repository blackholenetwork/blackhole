# Minimal golangci-lint v2.x configuration
version: 2.0

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - dogsled
    - dupl
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - unconvert
    - unparam
    - whitespace

linters-settings:
  gocritic:
    disabled-checks:
      - sloppyTypeAssert
      - ifElseChain

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - gosec