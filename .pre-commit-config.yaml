# Full pre-commit configuration with all tools
# Use SKIP environment variable to skip specific hooks

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-shebang-scripts-are-executable
      - id: check-executables-have-shebangs
      - id: detect-private-key
      - id: fix-byte-order-marker
      - id: mixed-line-ending
        args: ['--fix=lf']
      # - id: no-commit-to-branch
      #   args: ['--branch', 'main']  # Enable this in production

  # Go-specific checks (most are handled by make lint/test)
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      # - id: go-fmt        # Handled by make lint
      # - id: go-vet        # Handled by make lint
      # - id: go-imports    # Handled by make lint
      # - id: go-cyclo      # Handled by make lint
      # - id: golangci-lint # Handled by make lint
      - id: go-mod-tidy     # Keep this for go.mod/go.sum consistency
      # - id: go-unit-tests # Handled by make test
      - id: go-build        # Keep this for build verification
      # - id: go-critic     # Handled by make lint

  # Shell script checks
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: shellcheck
      - id: shfmt
        args: ['-w', '-i', '2']

  # Docker linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        name: Lint Dockerfiles
        description: Runs hadolint Docker image to lint Dockerfiles
        language: docker_image
        types: ["dockerfile"]
        entry: ghcr.io/hadolint/hadolint:v2.12.0 hadolint

  # Commit message format
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.8.2
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Secret scanning - uncomment after running: ggshield auth login
  # - repo: https://github.com/gitguardian/ggshield
  #   rev: v1.40.0
  #   hooks:
  #     - id: ggshield
  #       language: python
  #       stages: [pre-commit]
  #       args: ['secret', 'scan', 'pre-commit']

  # Local hooks
  - repo: local
    hooks:
      - id: make-lint
        name: Run make lint
        entry: make lint
        language: system
        types: [go]
        pass_filenames: false

      - id: test-changed
        name: Test changed packages
        entry: ./scripts/test-changed.sh
        language: system
        types: [go]
        pass_filenames: false

      - id: go-generate
        name: Go Generate
        entry: go generate ./...
        language: system
        types: [go]
        pass_filenames: false

      # The following are handled by make lint:
      # - id: gofumpt
      # - id: go-mod-verify
      # - id: go-security

      # - id: go-licenses
      #   name: Check Go Licenses
      #   entry: go-licenses check ./...
      #   language: system
      #   types: [go]
      #   pass_filenames: false

# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [go-unit-tests, go-build, ggshield]
  submodules: false
