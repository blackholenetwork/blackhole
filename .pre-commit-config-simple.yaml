# Simplified pre-commit configuration
# Start with basic checks that work reliably

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-imports
        args: ['-local', 'github.com/blackholenetwork/blackhole']
      - id: go-cyclo
        args: ['-over', '15']
      - id: go-mod-tidy

  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: shellcheck
      - id: shfmt
        args: ['-w', '-i', '2']

  - repo: local
    hooks:
      - id: go-generate
        name: Go Generate
        entry: go generate ./...
        language: system
        types: [go]
        pass_filenames: false