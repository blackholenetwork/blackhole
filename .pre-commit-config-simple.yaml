# Simplified pre-commit configuration that uses Makefile commands
# This ensures consistency between manual runs and pre-commit hooks

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-shebang-scripts-are-executable
      - id: check-executables-have-shebangs
      - id: detect-private-key
      - id: fix-byte-order-marker
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Go mod tidy and build verification
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-mod-tidy
      - id: go-build

  # Shell script checks
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: shellcheck
      - id: shfmt
        args: ['-w', '-i', '2']

  # Docker linting
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        name: Lint Dockerfiles
        description: Runs hadolint Docker image to lint Dockerfiles
        language: docker_image
        types: ["dockerfile"]
        entry: ghcr.io/hadolint/hadolint:v2.12.0 hadolint

  # Local hooks using Makefile
  - repo: local
    hooks:
      - id: make-lint
        name: Run make lint
        entry: make lint
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-commit]

      - id: make-test
        name: Run make test
        entry: bash -c 'if ! make test > /tmp/test.log 2>&1; then cat /tmp/test.log | grep -E "(FAIL|Error:|panic:|--- FAIL)" | tail -50; exit 1; fi'
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-push]  # Run tests on push, not every commit

      - id: go-generate
        name: Go Generate
        entry: go generate ./...
        language: system
        types: [go]
        pass_filenames: false

# CI configuration
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [make-test, make-lint]  # CI runs these separately
  submodules: false
